@if (isLoading) {
  <!-- Estado de carga -->
  <div class="inset-0 flex items-center justify-center h-screen z-50">
    <div class="p-8 !rounded-md shadow-lg flex flex-col items-center">
      <mat-spinner aria-label="cargando" [diameter]="40" color="primary"></mat-spinner>
      <p class="mt-4 text-gray-600">Cargando...</p>
    </div>
  </div>
} @else if(results.length) {
  <div class="search-container categoria-search">
    <div class="">
    <div class="search-toolbar">
      <p class="search-results-label">
        Se encontraron {{ count }} resultados para "{{ query }}".
      </p>
      <div class="search-view-mode" role="group" aria-label="Modo de visualizacion de resultados">
        <mat-button-toggle-group [formControl]="viewModeControl" aria-label="Modo de vista">
          <mat-button-toggle value="card">Tarjetas</mat-button-toggle>
          <mat-button-toggle value="list">Lista</mat-button-toggle>
        </mat-button-toggle-group>
      </div>
    </div>
      <!--       <div *ngIf="loading" class="search-list">
      <div *ngFor="let i of numbers" class="ph-item">
        <div class="ph-col-12">
          <div class="ph-picture"></div>
          <div class="ph-row">
            <div class="ph-col-12 big"></div>
            <div class="ph-col-4"></div>
          </div>
        </div>
      </div>
    </div> -->

    @if (results?.length) {
      <app-search-list [mode]="viewModeControl.value" [videoclips]="results" [query]="query" [count]="count"></app-search-list>
    }

    @if (loadingMore) {
      <div class="search-loading-more">
        <ng-container
          *ngComponentOutlet="loadingStateComponent; inputs: { label: 'Cargando más resultados...', ariaLabel: 'Cargando más resultados' }"
        ></ng-container>
      </div>
    }

  </div>
</div>
} @else {

  <div class="flex mx-auto justify-center items-top h-screen mt-5 px-4">
    <mat-icon class="mr-3">error</mat-icon><h1 class="mb-0">No se encontraron resultados.</h1>
  </div>

}
