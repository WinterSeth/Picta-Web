<main class="playlists-page px-6 md:px-12 py-4 flex flex-col items-center">
  <div class="w-full max-w-5xl">
    <header class="profile-header mb-5">
      <h1 class="profile-header-title">Mis listas</h1>
      <p class="profile-header-subtitle">Organiza tus contenidos favoritos en colecciones personalizadas.</p>
    </header>

    <div class="profile-card p-6 md:p-10">
      <div class="flex justify-between items-center mb-6">
        <h2 class="font-secondary text-lg">Listas disponibles</h2>
        <button
          (click)="openCreateDialog()"
          color="primary"
          mat-flat-button
          class="hidden md:inline-flex">
          <mat-icon class="mr-2">add_circle</mat-icon>
          Crear lista
        </button>
        <button
          (click)="openCreateDialog()"
          color="primary"
          mat-icon-button
          class="md:hidden">
          <mat-icon>add_circle</mat-icon>
        </button>
      </div>

      <div class="border-t border-white/10 pt-6">
        @if (loading) {
          <div class="profile-loading">
            <mat-spinner aria-label="cargando" [diameter]="40" class="profile-loading-spinner"></mat-spinner>
            <span class="profile-loading-text">Cargando listas...</span>
          </div>
        } @else if (playlists?.length) {
          <app-playlist-table
            (onDelete)="delete($event)"
            [playlists]="playlists"></app-playlist-table>
        } @else {
          <div class="playlist-state">
            <span>No tienes listas creadas todavía.</span>
          </div>
        }
      </div>
    </div>
  </div>
</main>
