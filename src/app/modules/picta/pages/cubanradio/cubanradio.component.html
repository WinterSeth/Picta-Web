<section class="w-full space-y-3 container relative mx-auto">
  @if (canalBanners$ | async; as banners) {
    <app-carousel [images]="banners" [imageSize]="'800x400'" />
  }

<div class="flex flex-col lg:flex-row">
  <!-- Primer iframe con overlay -->
  <div class="relative w-full lg:w-1/2 mb-4 lg:mb-0 lg:pr-2">
    <iframe
      class="w-full"
      src="https://public-web-widget.webradiosite.com/app/widget/broadcaster/247079?hash=4b5dcf88092ec1ed77112bd9a980aeb8cdfa062e&theme=dark&color=1"
      style="height:300px;border-radius:10px;" border="0" frameborder="0"
      allow="autoplay; clipboard-write" allowtransparency="true">
    </iframe>
    <!-- Overlay para tapar la esquina superior derecha -->
    <div class="absolute top-0 right-4 w-[100px] h-[50px] bg-[#303030] !rounded-lg z-[9999] pointer-events-none !rounded-bl-md"></div>
  </div>

  <!-- Segundo iframe -->
  <div class="relative w-full lg:w-1/2 lg:pl-2">
      <iframe
        class="w-full"
        src="https://public-web-widget.webradiosite.com/app/widget/schedule/247079?hash=b4d383368b2f6fe50c4c96a79999624944ec07f2&theme=dark&color=1" 
        style="height:300px;border-radius:10px;" border="0" 
        frameborder="0" 
        allow="autoplay; clipboard-write" 
        allowtransparency="true">
      </iframe>
      <div class="absolute top-0 right-4 w-[100px] h-[50px] bg-[#303030] !rounded-lg z-[9999] pointer-events-none !rounded-bl-md"></div>
    </div>
</div>
    
  @if (top10$ | async; as videos) {
    <div class="pb-[100px]">
      <app-my-carousel-o title='Top 10' canal='CubanDJsPro Radio' [videos]="videos"></app-my-carousel-o>
    </div>
  }
    
    <!-- Reproductor fijo en el footer con Plyr -->
  <footer class="bg-black w-full mx-auto text-white relative p-0 shadow-sm z-50">
    <div class="p-1 bg-black !rounded-lg shadow-sm fixed bottom-4 flex flex-col md:flex-row justify-around items-center">
        <audio #audioPlayer class="hidden"></audio>
        
        <div class="flex items-center gap-4 w-full md:w-auto">
          <!-- Botón Play/Pause -->
          <button  mat-icon-button color="primary" (click)="togglePlay()" class="flex !bg-blue-600 !text-white hover:!bg-blue-700">
            <mat-icon>{{ isPlaying ? 'pause' : 'play_arrow' }}</mat-icon>
          </button>
          
          <!-- Botón Mute/Unmute -->
          <button mat-icon-button color="primary" (click)="toggleMute()" class="flex !bg-blue-600 !text-white hover:!bg-blue-700">
            <mat-icon>{{ isMuted ? 'volume_off' : 'volume_up' }}</mat-icon>
          </button>
          
          <!-- Slider de volumen corregido -->
        <mat-slider color="primary" class="hidden! md:flex! mx-4" min="0" max="100" step="1">
            <input matSliderThumb [value]="volume" (valueChange)="onVolumeChange($event)">
          </mat-slider>
          <span class="hidden md:flex text-sm w-10">{{volume}}%</span>
        </div>
        
        <div class="flex items-center gap-2 ml-4 mr-2 text-white">
          <mat-icon>headset</mat-icon>
          <span class="text-sm">{{listenersCount}}</span>
        </div>
         
        <!-- Enlaces a la derecha -->
        <div class="flex items-center gap-2 z-50">
          <!-- Enlace a PWA -->
          <a mat-flat-button color="primary" title="Aplicación Android"
            href="https://apps.apple.com/us/app/cubandjspro-radio/id6757763227?l=es-MX" target="_blank"
            class="mat-flat-button !rounded-md flex items-center text-white">
            <div class="flex items-center gap-3">
              <svg xmlns="http://www.w3.org/2000/svg" width="10" height="16" viewBox="0 0 10 16" fill="none">

                fill="#ffffff"
 />
            </svg>
            <span>iPhone</span>
            </div>
          </a>

          <!-- Enlace a la app Android -->
          <a mat-flat-button color="primary" title="Aplicación Android" href="https://play.google.com/store/apps/details?id=net.radiobroadcastapp.cubandjpro" target="_blank" class="mat-flat-button !rounded-md flex items-center text-white">
            <mat-icon class="mr-1">phone_android</mat-icon>
            <span>Android</span>
          </a>

        </div>
      </div>
  </footer>
</section>
